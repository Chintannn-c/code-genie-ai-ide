name: Code Genie Production Pipeline

on:
  push:
    branches: [ main, production ]
  pull_request:
    branches: [ main ]

jobs:
  backend-validation:
    name: Backend CI (Railway Ready)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Lint and Security Scan
        run: |
          pip install flake8 bandit
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          bandit -r . -ll

  frontend-build:
    name: Frontend CI (Vercel Ready)
    runs-on: ubuntu-latest
    needs: backend-validation
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Static Analysis
        run: flutter analyze

      - name: Run Tests
        run: flutter test
        
      - name: Build Flutter Web
        run: |
          flutter build web --release --base-href "/" \
            --dart-define=BASE_URL=https://code-genie.up.railway.app
         
      - name: Archive Web Build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: build/web

  deploy-production:
    name: Production Deployment
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: build/web
      
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (Backend)
        run: railway up --service backend --detach
          
      - name: Deploy to Vercel (Frontend)
        run: |
          npm install -g vercel
          vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
