name: Code Genie Production CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Backend Verification
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Backend Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Backend Lints
        run: |
          cd backend
          # ruff check . # (Enable when ready)

      # 2. Frontend Verification & Build
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Frontend Dependencies
        run: flutter pub get
        
      - name: Build Flutter Web (Production)
        run: |
          flutter build web --release --base-href "/" \
            --dart-define=BASE_URL=https://code-genie.up.railway.app
          
      # 3. Deployment Triggers
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --yes'
          working-directory: .
          
      - name: Deploy to Railway
        run: |
          # Railway CLI auto-deploys on push to connected repo
          echo "Railway deployment triggered via GitHub Integration"
